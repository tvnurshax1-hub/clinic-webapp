<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Klinika — Lokatsiya</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    color-scheme: light dark;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #111111);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  .icon {
    font-size: 56px;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 8px;
  }
  p {
    font-size: 14px;
    color: var(--tg-theme-hint-color, #777777);
    margin: 0 0 24px;
    line-height: 1.5;
  }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: var(--tg-theme-button-color, #2481cc);
    color: var(--tg-theme-button-text-color, #ffffff);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.6;
  }
  .status {
    margin-top: 16px;
    font-size: 13px;
    min-height: 18px;
  }
  .status.error { color: #d33; }
  .status.success { color: #1a8f3c; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">📍</div>
    <h1 id="title">Lokatsiyani tasdiqlash</h1>
    <p id="subtitle">Davomatni belgilash uchun joriy joylashuvingizni yuborishga ruxsat bering.</p>
    <button id="sendBtn">Lokatsiyani yuborish</button>
    <div class="status" id="status"></div>
  </div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  // URL'dagi ?action=checkin yoki ?action=checkout parametrini olish
  const params = new URLSearchParams(window.location.search);
  const action = params.get("action") || "checkin";

  const titleEl = document.getElementById("title");
  const subtitleEl = document.getElementById("subtitle");
  if (action === "checkout") {
    titleEl.textContent = "Ishdan ketishni tasdiqlash";
    subtitleEl.textContent = "Ish kunini yakunlash uchun joriy joylashuvingizni yuboring.";
  } else {
    titleEl.textContent = "Ishga kelishni tasdiqlash";
    subtitleEl.textContent = "Davomatni belgilash uchun joriy joylashuvingizni yuboring.";
  }

  const btn = document.getElementById("sendBtn");
  const statusEl = document.getElementById("status");

  function setStatus(text, type) {
    statusEl.textContent = text;
    statusEl.className = "status" + (type ? " " + type : "");
  }

  btn.addEventListener("click", () => {
    if (!navigator.geolocation) {
      setStatus("Brauzeringiz geolokatsiyani qo'llab-quvvatlamaydi.", "error");
      return;
    }

    btn.disabled = true;
    setStatus("Joylashuv aniqlanmoqda...", "");

    navigator.geolocation.getCurrentPosition(
      (position) => {
        const payload = {
          action: action,
          latitude: position.coords.latitude,
          longitude: position.coords.longitude,
          accuracy: position.coords.accuracy,
          timestamp: new Date().toISOString(),
        };

        if (tg && tg.sendData) {
          tg.sendData(JSON.stringify(payload));
          setStatus("✅ Yuborildi! Botga qaytishingiz mumkin.", "success");
          setTimeout(() => tg.close(), 700);
        } else {
          // Telegram tashqarisida ochilgan bo'lsa (test rejimi)
          setStatus("Telegram WebApp aniqlanmadi. Ma'lumot: " + JSON.stringify(payload), "error");
          btn.disabled = false;
        }
      },
      (error) => {
        let msg = "Joylashuvni aniqlab bo'lmadi.";
        if (error.code === error.PERMISSION_DENIED) {
          msg = "Lokatsiyaga ruxsat berilmadi. Brauzer sozlamalaridan ruxsat bering.";
        }
        setStatus("❌ " + msg, "error");
        btn.disabled = false;
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  });
</script>
</body>
</html>
