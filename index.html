<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klinika — Lokatsiya</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        p {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #888);
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        button {
            width: 100%;
            max-width: 320px;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.8; }

        #btn-send {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        #btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
            min-height: 20px;
            color: var(--tg-theme-hint-color, #888);
        }

        .error { color: #e53935 !important; }
        .success { color: #43a047 !important; }
    </style>
</head>
<body>

<div class="icon">📍</div>
<h1>Joylashuvni yuborish</h1>
<p>Tugmani bosing — telefon GPS orqali<br>haqiqiy joylashuvingiz aniqlanadi</p>

<button id="btn-send" onclick="sendLocation()">
    📍 Lokatsiyamni yuborish
</button>

<div id="status"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function setStatus(msg, type) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = type || '';
    }

    function sendLocation() {
        const btn = document.getElementById('btn-send');
        btn.disabled = true;
        setStatus('📡 GPS aniqlanmoqda...');

        if (!navigator.geolocation) {
            setStatus('❌ Qurilmangiz GPS ni qo\'llab-quvvatlamaydi', 'error');
            btn.disabled = false;
            return;
        }

        navigator.geolocation.getCurrentPosition(
            function(pos) {
                const data = {
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    accuracy: Math.round(pos.coords.accuracy)
                };
                setStatus('✅ Joylashuv aniqlandi, yuborilmoqda...', 'success');
                tg.sendData(JSON.stringify(data));
            },
            function(err) {
                btn.disabled = false;
                if (err.code === 1) {
                    setStatus('❌ GPS ruxsati berilmadi. Sozlamalardan ruxsat bering.', 'error');
                } else if (err.code === 2) {
                    setStatus('❌ GPS signali topilmadi. Ochiq joyga chiqing.', 'error');
                } else {
                    setStatus('❌ Xatolik yuz berdi. Qayta urinib ko\'ring.', 'error');
                }
            },
            {
                enableHighAccuracy: true,
                timeout: 15000,
                maximumAge: 0
            }
        );
    }
</script>

</body>
</html>
